<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Simulados</title>
  <link rel="stylesheet" href="/static/styles.css">
  
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

  <header class="header">
    <div class="container">
      <h1>🎓 Plataforma de Simulados</h1>
      <p>Prepare-se para os maiores vestibulares do país.</p>
    </div>
  </header>

  <main class="container">

    <section id="main-menu" class="panel">
      <h2>Selecione o seu simulado</h2>
      <div class="menu-grid">
        
        <button class="menu-card" id="btn-menu-enem">
          <div class="menu-card-icon">🔵</div>
          <div class="menu-card-content">
            <h3>Simulado ENEM</h3>
            <p>Gerar prova mesclada com questões oficiais do INEP.</p>
          </div>
        </button>

        <button class="menu-card" id="btn-menu-ita">
          <div class="menu-card-icon">✈️</div>
          <div class="menu-card-content">
            <h3>Simulado ITA</h3>
            <p>Treine com o banco de questões de alta performance.</p>
          </div>
        </button>

        <button class="menu-card disabled" disabled>
          <div class="menu-card-icon">🔴</div>
          <div class="menu-card-content">
            <h3>Simulado OAB</h3>
            <p>Em breve...</p>
          </div>
        </button>

      </div>
    </section>

    <section id="ita-generator-panel" class="panel hidden">
      <div class="panel-header-with-back">
        <button type="button" class="btn btn-secondary btn-sm" id="btn-back-menu-ita">← Voltar</button>
        <h2>Gerar Simulado ITA</h2>
      </div>

      <form id="ita-mix-form">
        <div class="field-row">
          <div class="field">
            <label for="ita-subject">Disciplina</label>
            <select id="ita-subject" name="ita-subject">
              <option value="todas">Todas (Física, Química, Mat)</option>
              <option value="fisica">Física</option>
              <option value="matematica">Matemática</option>
              <option value="quimica">Química</option>
            </select>
          </div>

          <div class="field">
            <label for="ita-phase">Fase</label>
            <select id="ita-phase" name="ita-phase">
              <option value="1">1ª Fase (Objetivas)</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="generate-ita-btn">
            Gerar Simulado ITA
          </button>
        </div>
      </form>
      <p id="ita-status" class="status" aria-live="polite"></p>
    </section>

    <section id="enem-generator-panel" class="panel hidden">
      <div class="panel-header-with-back">
        <button type="button" class="btn btn-secondary btn-sm" id="btn-back-menu">← Voltar</button>
        <h2>Gerar Simulado ENEM</h2>
      </div>

      <form id="mix-form">
        <div class="field-row">

          <div class="field">
            <label for="day">Dia da prova</label>
            <select id="day" name="day">
              <option value="1">Dia 1</option>
              <option value="2">Dia 2</option>
            </select>
          </div>

          <div class="field" id="language-field">
            <label for="language">Idioma (Questões 1–5)</label>
            <select id="language" name="language">
              <option value="ingles">Inglês</option>
              <option value="espanhol">Espanhol</option>
            </select>
          </div>

        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="generate-btn">
            Gerar Simulado
          </button>

          <button type="button" class="btn btn-secondary" id="toggle-answers-btn" disabled>
            Mostrar Gabarito
          </button>

          <a id="export-pdf-btn" class="btn btn-secondary disabled" href="#" download>
            Exportar PDF
          </a>
        </div>
      </form>

      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <div id="confirm-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <h2 id="modal-title"></h2>
        <p id="modal-message"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="modal-cancel-btn">Cancelar</button>
          <button type="button" class="btn btn-primary" id="modal-confirm-btn">Confirmar</button>
        </div>
      </div>
    </div>

    <section id="progress-container" class="panel hidden">
      <div class="progress-header">
        <span>Progresso do Simulado</span>
        <span id="progress-text">0/0 respondidas</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </section>

    <section id="exam-meta" class="exam-meta hidden"></section>

    <section id="questions" class="questions"></section>

  </main>

  <div id="finish-footer" class="finish-footer hidden">
    <button id="finish-btn" class="btn btn-primary">
        Finalizar Simulado
    </button>
  </div>
  
  <script src="/static/main.js"></script>
</body>
</html>
